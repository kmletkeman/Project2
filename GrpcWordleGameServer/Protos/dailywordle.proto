 Programmer: Kevin Letkeman
 Purpose: This file defines the gRPC service and messages for the Daily Wordle game, 
		  allowing clients to play the game and retrieve statistics
 Date: 2026-03-31
 */

syntax = "proto3";

option csharp_namespace = "GrpcWordleGameServer.Protos";

package wordle;

service DailyWordle {
	rpc Play (stream GuessRequest) returns (stream GuessResponse);
	rpc GetStats (Empty) returns (StatsResponse);
}

message Empty {}// An empty message used for requests that do not require any parameters

message GuessRequest {
	string guess = 1;
}

message GuessResponse {
	string feedback = 1;
	bool isCorrect = 2;
	bool gameOver = 3;
	string message = 4;
}

message StatsResponse {
	int32 players = 1;
	double winPercent = 2;
	map<int32, int32> guessDistribution = 3;// Map of number of guesses to count of players who won in that many guesses
}