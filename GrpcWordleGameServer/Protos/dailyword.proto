 Programmer: Kevin Letkeman
 Purpose: This file defines the gRPC service and messages for the Daily Word 
		  feature of the Wordle game server
 Date: 2026-03-31
 */

syntax = "proto3";

option csharp_namespace = "GrpcWordServer.Protos";

package wordle;

service DailyWord {
	rpc GetWord (Empty) returns (WordResponse);
	rpc ValidateWord (WordRequest) returns (BoolResponse);
}

message Empty {}// An empty message used for requests that do not require any parameters

message WordRequest {
	string word = 1;
}

message WordResponse {
	string word = 1;
}

message BoolResponse {
	bool valid = 1;
}